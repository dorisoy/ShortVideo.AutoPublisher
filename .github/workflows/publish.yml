name: Publish to GitHub Packages

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack Core Library
        run: dotnet pack src/ShortVideo.AutoPublisher.Core/ShortVideo.AutoPublisher.Core.csproj --configuration Release --no-build --output ./artifacts

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push ./artifacts/*.nupkg --source "https://nuget.pkg.github.com/dorisoy/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
